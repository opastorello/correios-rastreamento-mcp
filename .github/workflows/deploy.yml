name: Deploy no Coolify

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Aciona redeploy no Coolify
        run: |
          RESPONSE=$(curl -sL -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEPLOY_TOKEN }}" \
            "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}&force=true")
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $STATUS: $BODY"
          [ "$STATUS" = "200" ] && echo "Deploy acionado com sucesso" || (echo "Falha: HTTP $STATUS" && exit 1)
